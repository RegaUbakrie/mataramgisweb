version: '3.8'

services:
  mataram-webgis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mataram-webgis-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./dist:/app/public:ro
      - /var/log/mataram-webgis:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - webgis-network
    labels:
      - "com.example.description=WebGIS Mataram Production"
      - "com.example.version=1.0.0"

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: mataram-webgis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - mataram-webgis
    restart: unless-stopped
    networks:
      - webgis-network

networks:
  webgis-network:
    driver: bridge
